name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # The WCAG 2.2 AA sweep lives here (src/theme/adapt.sweep.test.ts).
      # It is a hard gate: any failing pairing on any of the 348 combos in
      # either mode fails the build. See docs/adr/0002-combo-adaptation-model.md.
      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # `light-dark()` carries the whole neutral ramp across modes. Lightning
      # CSS downlevels it for older targets, and its polyfill keys off
      # `prefers-color-scheme` alone, which breaks the mode override in built
      # output only. `build.cssTarget` prevents that; this proves it.
      - name: Assert light-dark() survives minification
        run: grep -q "light-dark(" dist/assets/*.css
