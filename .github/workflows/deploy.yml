name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege plus the two Pages needs: `pages: write` to publish and
# `id-token: write` for the OIDC token `deploy-pages` exchanges for it.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time, and never cancel one in flight — a half-published site
# is worse than a stale one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      # `enablement` turns Pages on for the repo if it is off, so the first run
      # of this workflow does not need a visit to the settings page.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # The SPA fallback (ADR 0004 §9). Vite's `github-pages-spa-fallback`
      # plugin writes it; without it every deep link 404s on reload, which is a
      # failure only a deployed reload would reveal.
      - name: Assert the SPA fallback shipped
        run: cmp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
